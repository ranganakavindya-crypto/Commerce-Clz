<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NEXTGEN Minds</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: var(--space-xl) auto;
            padding: var(--space-lg);
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }
        
        .auth-container h2 {
            text-align: center;
            margin-bottom: var(--space-sm);
            color: var(--primary);
        }
        
        .auth-subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: var(--space-lg);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }
        
        .form-group {
            margin-bottom: var(--space-md);
        }
        
        .form-group label {
            display: block;
            margin-bottom: var(--space-xs);
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: var(--space-sm);
            margin: var(--space-md) 0;
            font-size: 0.9rem;
        }
        
        .terms input {
            margin-top: 4px;
        }
        
        .terms a {
            color: var(--primary);
        }
        
        .auth-links {
            text-align: center;
            margin-top: var(--space-md);
        }
        
        .auth-links a {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="container header-flex">
            <div class="logo">
                <a href="index.html">
                    <img src="https://placehold.co/200x60/667eea/ffffff?text=NEXTGEN+Minds&font=roboto" alt="Logo">
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2>Create Your Account</h2>
            <p class="auth-subtitle">Join NEXTGEN Minds and start learning today</p>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number *</label>
                    <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10}" placeholder="07XXXXXXXX">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="grade">Grade *</label>
                        <select id="grade" name="grade" required>
                            <option value="">Select Grade</option>
                            <option value="12">Grade 12</option>
                            <option value="13">Grade 13</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="stream">Stream *</label>
                        <select id="stream" name="stream" required>
                            <option value="">Select Stream</option>
                            <option value="commerce">Commerce</option>
                            <option value="science">Science</option>
                            <option value="arts">Arts</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <div class="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="terms.html">Terms and Conditions</a> and <a href="#">Privacy Policy</a> *</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
